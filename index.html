<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XENO_OS_MASTER_Ω</title>
    <style>
        :root {
            --alien-cyan: #00f2ff;
            --plasma-purple: #bc13fe;
            --void-black: #020205;
            --energy-gold: #f4d03f;
            --flipper-orange: #FF8C00;
            --glass: rgba(0, 242, 255, 0.05);
        }

        /* টাচ ও ভিউপোর্ট অপ্টিমাইজেশন */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--void-black);
            color: var(--alien-cyan);
            font-family: 'Courier New', monospace;
            height: 100vh; width: 100vw;
            overflow: hidden;
            perspective: 1000px;
        }

        #nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #020205 100%);
            z-index: -2;
        }

        .hud-frame {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            pointer-events: none;
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        .core-container {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        .ring {
            position: absolute;
            border: 2px solid var(--alien-cyan);
            border-radius: 50%;
            border-top-color: transparent;
            animation: rotate var(--d) linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .symbol-grid { position: absolute; width: 100%; height: 100%; }

        .alien-node {
            position: absolute;
            width: 65px; height: 65px;
            background: var(--glass);
            border: 1px solid var(--alien-cyan);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            transition: 0.3s;
            pointer-events: all;
            z-index: 10;
        }
        .alien-node:active { transform: scale(1.3) rotate(45deg); background: rgba(0, 242, 255, 0.3); }
        .node-label { font-size: 8px; position: absolute; bottom: -15px; width: 80px; text-align: center; color: var(--energy-gold); transform: rotate(-45deg); }

        .void-console {
            position: absolute;
            bottom: 160px; left: 50%;
            transform: translateX(-50%);
            width: 92%; height: 130px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 4px solid var(--plasma-purple);
            padding: 10px;
            font-size: 10px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            display: flex; flex-direction: column-reverse; /* নতুন মেসেজ উপরে আসবে */
        }

        .flipper-controls {
            position: absolute;
            bottom: 0; width: 100%; height: 150px;
            background: var(--flipper-orange);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .joy-btn {
            width: 45px; height: 45px; background: #222; border: none;
            border-radius: 50%; color: white; font-size: 18px; font-weight: bold;
        }
        .joy-btn:active { background: #000; }

        .execute-btn {
            width: 85px; height: 85px; background: #000; border: 4px solid #333;
            border-radius: 50%; color: var(--flipper-orange); font-weight: bold;
            display: flex; align-items: center; justify-content: center; text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); font-size: 12px;
        }

        .glitch { animation: glitch 1s infinite; color: var(--energy-gold); font-weight: bold; margin-bottom: 5px; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.6; color: var(--plasma-purple); } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="nebula"></div>
    <div class="hud-frame"></div>

    <div class="core-container">
        <div class="ring" style="width: 320px; height: 320px; --d: 12s; opacity: 0.2;"></div>
        <div class="ring" style="width: 260px; height: 260px; --d: 8s; opacity: 0.5;"></div>
        <div class="ring" style="width: 200px; height: 200px; --d: 5s;"></div>
        <div class="symbol-grid" id="nodes"></div>
    </div>

    <div class="void-console">
        <div id="output"></div>
        <div class="glitch" id="status-bar">STATUS: INITIALIZING...</div>
    </div>

    <div class="flipper-controls">
        <div class="d-pad">
            <div></div><button class="joy-btn" onclick="cmd('NAV_UP', 'Scanning high-freq...')">▲</button><div></div>
            <button class="joy-btn" onclick="cmd('NAV_LEFT', 'Adjusting Gain...')">◀</button>
            <button class="joy-btn" onclick="cmd('OK', 'Node Confirmed.')">●</button>
            <button class="joy-btn" onclick="cmd('NAV_RIGHT', 'Signal Locked.')">▶</button>
            <div></div><button class="joy-btn" onclick="cmd('NAV_DOWN', 'Terminating...')">▼</button><div></div>
        </div>
        <div class="execute-btn" onclick="deployMaster()">MASTER<br>DEPLOY</div>
    </div>

    <script>
        // --- টুলস ডাটা ---
        const tools = [
            { icon: 'Ж', label: 'NMAP', desc: 'Scanning network ports...' },
            { icon: 'Ѻ', label: 'SHELL', desc: 'Opening Root Terminal...' },
            { icon: 'Ϟ', label: 'SNIFF', desc: 'Intercepting data packets...' },
            { icon: '∞', label: 'WIFI', desc: 'Cracking handshake...' },
            { icon: '◬', label: 'AIM', desc: 'Free Fire 4-Finger Aim Lock...' },
            { icon: '⚡', label: 'PWN', desc: 'Executing Metasploit payload...' }
        ];

        const nodesContainer = document.getElementById('nodes');
        const output = document.getElementById('output');
        const statusBar = document.getElementById('status-bar');

        // --- এলিয়েন নোড জেনারেশন ---
        tools.forEach((data, i) => {
            const angle = (i / tools.length) * Math.PI * 2;
            const x = Math.cos(angle) * 140;
            const y = Math.sin(angle) * 140;
            const node = document.createElement('div');
            node.className = 'alien-node';
            node.style.left = `calc(50% + ${x}px - 32px)`;
            node.style.top = `calc(50% + ${y}px - 32px)`;
            node.innerHTML = `<span>${data.icon}</span><div class="node-label">${data.label}</div>`;
            node.onclick = () => {
                cmd(data.label, data.desc);
            };
            nodesContainer.appendChild(node);
        });

        // --- রিয়েল-টাইম স্ট্যাটাস (সময় ও ব্যাটারি) ---
        function updateStatus() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    const level = Math.floor(battery.level * 100);
                    statusBar.innerHTML = `XENO_ACTIVE | [ ${timeStr} ] | [ PWR: ${level}% ]`;
                });
            } else {
                statusBar.innerHTML = `XENO_ACTIVE | [ ${timeStr} ]`;
            }
        }
        setInterval(updateStatus, 1000);

        // --- ডাইনামিক টার্মিনাল কমান্ড ---
        function cmd(name, action) {
            if (navigator.vibrate) navigator.vibrate(40);
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.style.borderBottom = "1px solid rgba(0,242,255,0.1)";
            entry.style.marginBottom = "5px";
            entry.innerHTML = `<span style="color:var(--plasma-purple)">[${timestamp}]</span> <span style="color:white">${name}</span><br><span style="color:var(--alien-cyan)"> > ${action}</span>`;
            output.prepend(entry); // নতুন মেসেজ উপরে দেখাবে
        }

        // --- মাস্টার পেলোড (সব পারমিশন একসাথে) ---
        async function deployMaster() {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
            cmd('CRITICAL', 'Master Payload Deployed. Requesting Uplink...');
            
            try {
                // ক্যামেরা রিকোয়েস্ট (সিমুলেশন)
                await navigator.mediaDevices.getUserMedia({ video: true });
                cmd('SUCCESS', 'Camera access linked to Xeno_Core.');
            } catch (e) {
                cmd('WARNING', 'Hardware access denied.');
            }
            
            // লোকেশন ও নোটিফিকেশন ট্রাই
            navigator.geolocation.getCurrentPosition(()=>{}, ()=>{});
            Notification.requestPermission();
        }

        // --- এনার্জি পার্টিকেলস ---
        function createParticle() {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '2px'; p.style.height = '2px';
            p.style.background = Math.random() > 0.5 ? 'var(--alien-cyan)' : 'var(--plasma-purple)';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.opacity = Math.random();
            p.style.pointerEvents = 'none';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }
        setInterval(createParticle, 400);
    </script>
</body>
</html>
